name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            asset: netreach-linux-x64
            zip: netreach-linux-x64.zip
          - os: ubuntu-24.04-arm
            label: linux-arm64
            asset: netreach-linux-arm64
            zip: netreach-linux-arm64.zip
          - os: macos-13
            label: macos-x64
            asset: netreach-darwin-x64
            zip: netreach-macos-x64.zip
          - os: macos-14
            label: macos-arm64
            asset: netreach-darwin-arm64
            zip: netreach-macos-arm64.zip
          - os: windows-latest
            label: windows-x64
            asset: netreach-win32-x64.exe
            zip: netreach-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js (official build with SEA fuse)
        uses: actions/setup-node@v4
        id: setup-node
        with:
          node-version: "22.11.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch latest GeoIP databases
        run: node scripts/download-db.js

      - name: Build SEA executable
        run: node scripts/build-sea.js

      - name: Package (zip) - Unix
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -9 "${{ matrix.zip }}" "${{ matrix.asset }}"
          ls -lh

      - name: Package (zip) - Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location dist
          Compress-Archive -Path "${{ matrix.asset }}" -DestinationPath "${{ matrix.zip }}" -Force
          Get-ChildItem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/${{ matrix.zip }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -name "*.zip" -exec cp {} release/ \;
          ls -lh release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
